models:
  strong:
    name: "openrouter/owl-alpha"
    provider: openrouter
    seed: 42
    max_tokens: 1024
  fast:
    name: "openrouter/owl-alpha"
    provider: openrouter
    seed: 42
    max_tokens: 512

retrieval:
  top_k: 50
  ivfflat_probes: 10

split:
  mini_size: 3000
  eval_frac: 0.10
  seed: 42

representation:
  model: BAAI/bge-large-en-v1.5
  embedding_dim: 1024

clustering:
  base:
    algorithm: hdbscan
    min_cluster_size: 50
    min_samples: 10
    cluster_selection_method: eom
    cluster_selection_epsilon: 0.0
    prob_threshold: 0.01
  online:
    drilldown_min_cluster_size: 10
    recut_min_cluster_size: 30

fusion:
  text_weight: 0.6
  review_weight: 0.4
  trailer_weight: 0.0

umap:
  n_neighbors: 15
  min_dist: 0.1

conversation:
  cost_limit_usd: 5.0
  max_messages: 100

ingestion:
  hf_repo: "446f6e6e79/CinePal-embeddings"
  artifacts:
    snapshot: snapshots/snapshot_20260517.parquet
    main: embeddings/main_20260517.parquet
    mini: embeddings/mini_20260517.parquet
    eval_holdout: embeddings/eval_holdout_20260517.parquet
